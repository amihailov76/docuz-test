# Russian/Substitutions.yml
# Замены: неправильная формулировка → рекомендуемая.
# Vale показывает конкретную замену прямо в предупреждении.

extends: substitution
message: "Замените '%s' на '%s' согласно стайлгайду."
link: https://github.com/amihailov76/docuz-test/blob/main/style_guide/02_neutral_tone.md
level: warning
ignorecase: true
swap:

  # ── Разрешение ──────────────────────────────────────────────────────────
  'допускается':        'вы можете'
  'не допускается':     'недоступно' # или переформулируйте как факт
  'разрешается':        'вы можете'
  'не разрешается':     'недоступно'
  'позволяется':        'вы можете'
  'разрешено':          'вы можете'

  # ── Необходимость ────────────────────────────────────────────────────────
  'вы должны':          'вам нужно'
  'вам следует':        'вам нужно'
  'необходимо (?!отметить)': 'нужно'
  'обязаны':            'вам нужно'
  'требуется (?!авторизация|перезагрузка|установка)': 'нужно'

  # ── Ограничения ──────────────────────────────────────────────────────────
  'запрещается':        'недоступно / невозможно'
  'запрещено':          'недоступно / невозможно'

  # ── Глаголы «смотреть» → «см.» ──────────────────────────────────────────
  # \b гарантирует: не срабатывает на «просмотрите», «рассмотрите» и т.п.
  '\bсмотрите\b':           'см.'
  '\bсмотрите раздел\b':    'см. раздел'

  # ── Канцелярит: сказуемые с отглагольными существительными ──────────────
  'производит проверку':      'проверяет'
  'выполняет проверку':       'проверяет'
  'осуществляет проверку':    'проверяет'
  'производит настройку':     'настраивает'
  'выполняет настройку':      'настраивает'
  'осуществляет настройку':   'настраивает'
  'производит обновление':    'обновляет'
  'выполняет обновление':     'обновляет'
  'производит установку':     'устанавливает'
  'выполняет установку':      'устанавливает'
  'осуществляет установку':   'устанавливает'
  'производит анализ':        'анализирует'
  'выполняет анализ':         'анализирует'
  'осуществляет анализ':      'анализирует'
  'производит подключение':   'подключается'
  'выполняет подключение':    'подключается'
  'осуществляет подключение': 'подключается'
  'производит загрузку':      'загружает'
  'выполняет загрузку':       'загружает'
  'осуществляет загрузку':    'загружает'

  # ── Пустые слова ─────────────────────────────────────────────────────────
  'при необходимости вы можете': 'вы можете'
  'в процессе работы':           ''   # удалить
  'для корректной работы':       ''   # удалить
  'в любой момент времени':      'в любой момент'
  'новую папку':                 'папку'
  # «Создайте новый файл» — тавтология; «загрузите новый файл» — валидно
  '\bсоздайте нов(ый|ую|ое)\s+файл\b': 'создайте файл'
  'текущей версии':              'версии'
  'применяемой лицензии':        'лицензии'
