# Russian/Substitutions.yml
#
# Директивные и модальные формулировки, запрещённые стайлгайдом.
#
# ⚠️  Тип: existence (НЕ substitution).
#     Vale substitution двунаправленный: он автоматически строит обратный
#     словарь и начинает флагать правильные формы как запрещённые.
#     existence — однонаправленный: только помечает найденные паттерны.
#
# Замены (для LLM и разработчиков):
#   допускается / разрешается / позволяется / разрешено  → 'вы можете'
#   не допускается / не разрешается                      → 'недоступно'
#   запрещается / запрещено                              → 'недоступно / невозможно'
#   вы должны / вам следует / обязаны                    → 'вам нужно'
#   необходимо / требуется                               → 'нужно'
#   смотрите [раздел]                                    → 'см. [раздел]'
#   при необходимости вы можете                          → 'вы можете'

extends: existence
message: "Директивная или модальная формулировка: '%s'. Замените на нейтральную форму (стайлгайд: нейтральный тон)."
link: https://github.com/amihailov76/docuz-test/blob/main/style_guide/02_neutral_tone.md
level: warning
nonword: true
raw:

  # ── Разрешение ──────────────────────────────────────────────────────────
  - '[Дд]опускается'
  - '[Нн]е допускается'
  - '[Рр]азрешается'
  - '[Нн]е разрешается'
  - '[Пп]озволяется'
  - '[Рр]азрешено'

  # ── Необходимость ────────────────────────────────────────────────────────
  - '[Вв]ы должны'
  - '[Вв]ам следует'
  - '[Нн]еобходимо'
  - '[Оо]бязаны'
  - '[Тт]ребуется'

  # ── Ограничения ──────────────────────────────────────────────────────────
  - '[Зз]апрещается'
  - '[Зз]апрещено'

  # ── Глаголы «смотреть» → «см.» ──────────────────────────────────────────
  - '[Сс]мотрите раздел'
  - '[Сс]мотрите'

  # ── Пустые слова ─────────────────────────────────────────────────────────
  - '[Пп]ри необходимости вы можете'
