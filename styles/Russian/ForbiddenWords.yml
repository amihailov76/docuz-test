# Russian/ForbiddenWords.yml
# Запрещённые слова и фразы по стайлгайду.
# Vale помечает их как warning, LLM-агент объясняет конкретную проблему.

extends: existence
message: "Запрещённое слово или фраза: '%s'. Замените на более точную формулировку."
link: https://github.com/amihailov76/docuz-test/blob/main/style_guide/03_word_choice.md
level: warning
nonword: false
raw:
  - '\b[Нн]а самом деле\b'
  - '\b[Рр]азличн(ый|ая|ое|ые|ых|ым|ыми)\b'
  - '\b[Оо]пределённ(ый|ая|ое|ые|ых|ым|ыми)\b'
  - '\b[Нн]епосредственн(ый|ая|ое|ые|ых|ым|ыми|о)\b'
  - '\b[Сс]оответствующ(ий|ая|ее|ие|их|им|ими)\b'
  - '\b[Тт]от или иной\b'
  - '\b[Тт]а или иная\b'
  - '\b[Тт]о или иное\b'

  # Оговорки (неуверенность)
  - '\b[Вв] большинстве случаев\b'
  - '\b[Вв] некоторых случаях\b'
  - '\b[Нн]екоторые\b'
  - '\b[Фф]актически\b'
  - '\b[Пп]рактически\b'
  - '\b[Дд]остаточно часто\b'
  - '\b[КкАа]ак правило\b'
  - '\b[КкАа]ак правило,\b'

  # Авторская речь
  - '\b[Рр]ассмотрим\b'
  - '\b[Вв]ам предлагается\b'
  - '\b[Сс]тоит (?:подчеркнуть|помнить|заметить|отметить)\b'
  - '\b[Нн]еобходимо отметить, что\b'
  - '\b[Яя]сно, что\b'
  - '\b[ОоЕе]чевидно, что\b'

  # Усиления (в информационном контексте — не в Warning/Note)
  # Только самые агрессивные, остальные оставляем LLM
  - '\b[Аа]бсолютно точно\b'
  - '\b[Нн]есомненно\b'

  # Оценочные слова
  - '\b[УуМм]добн(ый|ая|ое|ые|о)\b'
  - '\b[МмОо]ощн(ый|ая|ое|ые|о)\b'
  - '\b[ГгБб]ибк(ий|ая|ое|ие|о)\b'
  - '\b[Нн]адёжн(ый|ая|ое|ые|о)\b'
  - '\b[ЭэПп]ффективн(ый|ая|ое|ые|о)\b'
  - '\b[Пп]рост(ой|ая|ое|ые|о) в\b'
  - '\b[Уу]никальн(ый|ая|ое|ые)\b'

  # Запрещённые формулировки ограничений
  - '\b[Зз]апрещается\b'
  - '\b[Зз]апрещено\b'
  - '\b[Нн]е допускается\b'
  - '\b[Нн]е разрешается\b'

  # Тавтологии (самые частые)
  - '\b[Вв] любой момент времени\b'
  - '\b[Вв]ыполнить проверку\b'
  - '\b[Пп]роизвести проверку\b'
  - '\b[Оо]существить проверку\b'
  - '\b[Вв]ыполнить настройку\b'
  - '\b[Пп]роизвести настройку\b'
  - '\b[Оо]существить настройку\b'
  # «Создайте новую папку» — тавтология (папка по умолчанию новая)
  # НЕ «загрузите новый файл» — там «новый» противопоставлен существующему
  - '\b[Сс]оздайте\s+нов(ый|ую|ое)\s+(?:файл|папк[уа]?|раздел|документ)\b'

  # Антропоморфизм
  - '\b[Пп]рограмма (?:хочет|думает|считает|знает|понимает|отказывается)\b'
  - '\b[Сс]истема (?:хочет|думает|считает|знает|понимает|отказывается)\b'
  - '\b[Сс]ервис (?:хочет|думает|считает|знает|понимает|отказывается)\b'
