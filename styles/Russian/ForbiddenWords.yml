# Russian/ForbiddenWords.yml
# Запрещённые слова и фразы по стайлгайду.
# Vale помечает их как warning, LLM-агент объясняет конкретную проблему.
# Примечание: \b не работает с кириллицей в Go regexp — используем паттерны без word boundaries.

extends: existence
message: "Запрещённое слово или фраза: '%s'. Замените на более точную формулировку."
link: https://github.com/amihailov76/docuz-test/blob/main/style_guide/03_word_choice.md
level: warning
nonword: true
raw:
  - '[Нн]а самом деле'
  - '[Рр]азличн(ый|ая|ое|ые|ых|ым|ыми)'
  - '[Оо]пределённ(ый|ая|ое|ые|ых|ым|ыми)'
  - '[Нн]епосредственн(ый|ая|ое|ые|ых|ым|ыми|о)'
  - '[Сс]оответствующ(ий|ая|ее|ие|их|им|ими)'
  - '[Тт]от или иной'
  - '[Тт]а или иная'
  - '[Тт]о или иное'

  # Оговорки (неуверенность)
  - '[Вв] большинстве случаев'
  - '[Вв] некоторых случаях'
  - '[Нн]екоторые'
  - '[Фф]актически'
  - '[Пп]рактически'
  - '[Дд]остаточно часто'
  - '[Кк]ак правило'

  # Авторская речь
  - '[Рр]ассмотрим'
  - '[Вв]ам предлагается'
  - '[Сс]тоит (?:подчеркнуть|помнить|заметить|отметить)'
  - '[Нн]еобходимо отметить, что'
  - '[Яя]сно, что'
  - '[ОоЕе]чевидно, что'

  # Усиления
  - '[Аа]бсолютно точно'
  - '[Нн]есомненно'

  # Оценочные слова
  - '[УуМм]добн(ый|ая|ое|ые|о)'
  - '[МмОо]ощн(ый|ая|ое|ые|о)'
  - '[ГгБб]ибк(ий|ая|ое|ие|о)'
  - '[Нн]адёжн(ый|ая|ое|ые|о)'
  - '[ЭэПп]ффективн(ый|ая|ое|ые|о)'
  - '[Пп]рост(ой|ая|ое|ые|о) в'
  - '[Уу]никальн(ый|ая|ое|ые)'

  # Запрещённые формулировки ограничений
  - '[Зз]апрещается'
  - '[Зз]апрещено'
  - '[Нн]е допускается'
  - '[Нн]е разрешается'

  # Тавтологии (самые частые)
  - '[Вв] любой момент времени'
  - '[Вв]ыполнить проверку'
  - '[Пп]роизвести проверку'
  - '[Оо]существить проверку'
  - '[Вв]ыполнить настройку'
  - '[Пп]роизвести настройку'
  - '[Оо]существить настройку'
  - '[Сс]оздайте\s+нов(ый|ую|ое)\s+(?:файл|папк[уа]?|раздел|документ)'

  # Сложные замены (перенесены из Substitutions.yml — не поддерживаются в swap)
  - '[Вв] процессе работы'
  - '[Дд]ля корректной работы'

  # Антропоморфизм
  - '[Пп]рограмма (?:хочет|думает|считает|знает|понимает|отказывается)'
  - '[Сс]истема (?:хочет|думает|считает|знает|понимает|отказывается)'
  - '[Сс]ервис (?:хочет|думает|считает|знает|понимает|отказывается)'
