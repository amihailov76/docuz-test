# Russian/Kancellyarit.yml
#
# Канцелярит: сказуемые с отглагольными существительными.
# Стайлгайд требует заменять их на глагол-сказуемое.
#
# Замены:
#   производит/выполняет/осуществляет проверку   → проверяет
#   производит/выполняет/осуществляет настройку  → настраивает
#   производит/выполняет обновление               → обновляет
#   производит/выполняет/осуществляет установку  → устанавливает
#   производит/выполняет/осуществляет анализ     → анализирует
#   производит/выполняет/осуществляет подключение → подключается
#   производит/выполняет/осуществляет загрузку   → загружает
#
# Пустые слова:
#   в любой момент времени   → в любой момент
#   новую папку              → папку
#   текущей версии           → версии
#   применяемой лицензии     → лицензии

extends: existence
message: "Канцелярит: '%s'. Замените на глагол-сказуемое (стайлгайд: выбор слов)."
link: https://github.com/amihailov76/docuz-test/blob/main/style_guide/03_word_choice.md
level: warning
nonword: true
raw:

  # ── Отглагольные существительные ────────────────────────────────────────
  - '[Пп]роизводит проверку'
  - '[Вв]ыполняет проверку'
  - '[Оо]существляет проверку'
  - '[Пп]роизводит настройку'
  - '[Вв]ыполняет настройку'
  - '[Оо]существляет настройку'
  - '[Пп]роизводит обновление'
  - '[Вв]ыполняет обновление'
  - '[Пп]роизводит установку'
  - '[Вв]ыполняет установку'
  - '[Оо]существляет установку'
  - '[Пп]роизводит анализ'
  - '[Вв]ыполняет анализ'
  - '[Оо]существляет анализ'
  - '[Пп]роизводит подключение'
  - '[Вв]ыполняет подключение'
  - '[Оо]существляет подключение'
  - '[Пп]роизводит загрузку'
  - '[Вв]ыполняет загрузку'
  - '[Оо]существляет загрузку'

  # ── Пустые слова ───────────────────────────────────────────────────────
  - '[Вв] любой момент времени'
  - '[Нн]овую папку'
  - '[Тт]екущей версии'
  - '[Пп]рименяемой лицензии'

raw_hints:

  # ── Отглагольные существительные ────────────────────────────────────────
  - "проверяет"
  - "проверяет"
  - "проверяет"
  - "настраивает"
  - "настраивает"
  - "настраивает"
  - "обновляет"
  - "обновляет"
  - "устанавливает"
  - "устанавливает"
  - "устанавливает"
  - "анализирует"
  - "анализирует"
  - "анализирует"
  - "подключается"
  - "подключается"
  - "подключается"
  - "загружает"
  - "загружает"
  - "загружает"

  # ── Пустые слова ───────────────────────────────────────────────────────
  - "в любой момент"
  - "папку"
  - "версии"
  - "лицензии"
