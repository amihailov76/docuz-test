  - '[Вв]ыполняет анализ'
  - '[Оо]существляет анализ'
  - '[Пп]роизводит подключение'
  - '[Вв]ыполняет подключение'
  - '[Оо]существляет подключение'
  - '[Пп]роизводит загрузку'
  - '[Вв]ыполняет загрузку'
  - '[Оо]существляет загрузку'

