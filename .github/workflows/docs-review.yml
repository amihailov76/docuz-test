name: Docs Review

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Номер PR для проверки (оставьте пустым — workflow завершится без ошибки)'
        required: false
        default: ''

concurrency:
  group: docs-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-review:
    if: github.event.label.name == 'docs-review' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      # ── 1. Получаем код ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────
      - name: Install Python deps
        run: |
          pip install -r .github/scripts/requirements.txt --quiet

      # ── 3. Vale ──────────────────────────────────────────────────
      - name: Install Vale
        run: |
          VALE_VERSION="3.14.2"
          curl -sL --max-time 120 \
            "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Windows_64-bit.zip" \
            -o "$RUNNER_TEMP/vale.zip"
          unzip -o "$RUNNER_TEMP/vale.zip" -d "$RUNNER_TEMP/vale-bin"
          echo "$RUNNER_TEMP/vale-bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/vale-bin/vale" --version

      # ── 3а. Диагностика Vale-конфигов (помогает при отладке) ─────
      - name: Vale config diagnostics
        run: |
          echo "=== .vale-ru.ini ===" && \
            "$RUNNER_TEMP/vale-bin/vale" --config="$(pwd)/.vale-ru.ini" ls-config 2>&1 | head -40 || true
          echo "=== .vale-en.ini ===" && \
            "$RUNNER_TEMP/vale-bin/vale" --config="$(pwd)/.vale-en.ini" ls-config 2>&1 | head -40 || true

      # ── 4. Определяем изменённые файлы ───────────────────────────
      - name: Get changed docs files
        id: changed-files
        run: |
          BASE="${{ github.base_ref || 'main' }}"
          CHANGED=$(git diff --name-only "origin/${BASE}...HEAD" \
            | grep -E '^docs/(ru|en)/.+\.mdx$' \
            || true)
          if [ -z "$CHANGED" ]; then
            echo "No eligible docs files changed."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "$CHANGED" > "$RUNNER_TEMP/changed_files.txt"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 5а. Python-линтер для русских файлов ──────────────────────
      # Vale existence+raw не матчит кириллицу на Windows-раннере.
      # Линтер загружает правила с MCP-сервера; при недоступности — локальный fallback.
      - name: Lint Russian files (Python)
        if: steps.changed-files.outputs.has_files == 'true'
        id: lint-ru
        env:
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          RU_FILES=$(grep 'docs/ru' "$RUNNER_TEMP/changed_files.txt" 2>/dev/null | tr '\n' ' ' || true)
          if [ -n "$RU_FILES" ]; then
            echo "[INFO] Проверяем русские файлы: $RU_FILES"
            python .github/scripts/ru_linter.py \
              --files $RU_FILES \
              --output "$RUNNER_TEMP/vale_ru.json" \
              --styles-dir "$(pwd)/styles/Russian"
          else
            echo "[INFO] Русских файлов нет — пропускаем."
            echo "{}" > "$RUNNER_TEMP/vale_ru.json"
          fi

      # ── 5б. Vale lint для английских файлов ──────────────────────
      # ВАЖНО: stderr Vale в отдельный файл — иначе ломает JSON.
      - name: Lint English files (Vale)
        if: steps.changed-files.outputs.has_files == 'true'
        id: lint-en
        run: |
          EN_FILES=$(grep 'docs/en' "$RUNNER_TEMP/changed_files.txt" 2>/dev/null | tr '\n' ' ' || true)
          if [ -n "$EN_FILES" ]; then
            echo "[INFO] Проверяем английские файлы: $EN_FILES"
            "$RUNNER_TEMP/vale-bin/vale" --config="$(pwd)/.vale-en.ini" --output=JSON $EN_FILES \
              > "$RUNNER_TEMP/vale_en.json" \
              2> "$RUNNER_TEMP/vale_en.err" \
              || true
            if [ -s "$RUNNER_TEMP/vale_en.err" ]; then
              echo "[WARN] Vale EN stderr:"
              cat "$RUNNER_TEMP/vale_en.err"
            fi
          else
            echo "[INFO] Английских файлов нет — пропускаем."
            echo "{}" > "$RUNNER_TEMP/vale_en.json"
          fi

      # ── 5в. Объединяем результаты ────────────────────────────────
      - name: Merge lint results
        if: steps.changed-files.outputs.has_files == 'true'
        id: vale
        run: |
          python - "$RUNNER_TEMP/vale_ru.json" "$RUNNER_TEMP/vale_en.json" \
            > "$RUNNER_TEMP/vale_output.json" << 'PYEOF'
          import json, os, sys
          merged = {}
          for path in sys.argv[1:]:
              if not os.path.exists(path):
                  continue
              try:
                  text = open(path, encoding="utf-8").read().strip()
                  if text.startswith("{"):
                      merged.update(json.loads(text))
                  elif text:
                      print(f"[WARN] {path}: не JSON — пропущен", file=sys.stderr)
              except Exception as e:
                  print(f"[WARN] {path}: {e}", file=sys.stderr)
          print(json.dumps(merged))
          PYEOF

          WARN_COUNT=$(python -c "
          import json, sys
          try:
              d = json.load(open('$RUNNER_TEMP/vale_output.json'))
              print(sum(len(v) for v in d.values() if isinstance(v, list)))
          except Exception as e:
              print(0, file=sys.stderr)
              print(0)
          " 2>/dev/null || echo 0)
          echo "Всего предупреждений: $WARN_COUNT"

      # ── 6. Health-check MCP-сервера ───────────────────────────────
      - name: MCP server health check
        if: steps.changed-files.outputs.has_files == 'true'
        id: mcp-health
        env:
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          STATUS="unavailable"
          if [ -z "$MCP_SERVER_URL" ]; then
            echo "MCP_SERVER_URL не задан, используем локальный стайлгайд."
          else
            for i in 1 2 3; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $MCP_API_KEY" \
                --max-time 10 \
                "$MCP_SERVER_URL/health" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                STATUS="ok"; break
              fi
              echo "Попытка $i: HTTP $HTTP_CODE. Повтор через 10с..."
              sleep 10
            done
          fi
          echo "mcp_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "MCP status: $STATUS"

      # ── 7. LLM review agent ───────────────────────────────────────
      - name: Run LLM review agent
        if: steps.changed-files.outputs.has_files == 'true'
        env:
          LLM_API_KEY:    ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:   ${{ vars.LLM_BASE_URL }}
          LLM_MODEL:      ${{ vars.LLM_MODEL }}
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_API_KEY:    ${{ secrets.MCP_API_KEY }}
          MCP_STATUS:     ${{ steps.mcp-health.outputs.mcp_status }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:      ${{ github.event.pull_request.number || inputs.pr_number }}
          REPO:           ${{ github.repository }}
          BASE_REF:       ${{ github.base_ref || 'main' }}
        run: |
          python .github/scripts/review-agent.py \
            --changed-files "$RUNNER_TEMP/changed_files.txt" \
            --vale-output "$RUNNER_TEMP/vale_output.json"
