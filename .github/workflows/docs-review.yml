name: Docs Review

# ─────────────────────────────────────────────────────────────────
# Trigger: запускается только когда на PR навешивают лейбл docs-review
# ─────────────────────────────────────────────────────────────────
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:   # ← временно: ручной запуск для отладки

# Одновременно может выполняться только один запуск на PR
concurrency:
  group: docs-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-review:
    # Запускаем если добавлен нужный лейбл или это ручной запуск
    if: github.event.label.name == 'docs-review' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 15

    # Все run-шаги используют bash (Git Bash на Windows)
    defaults:
      run:
        shell: bash

    steps:
      # ── 0. Debug: показываем контекст события ─────────────────────
      - name: Debug event context
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo "label.name: ${{ github.event.label.name }}"
          echo "PR number:  ${{ github.event.pull_request.number }}"
          echo "RUNNER_TEMP: $RUNNER_TEMP"

      # ── 1. Получаем код ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # нужна история для diff

      # ── 2. Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/scripts/requirements.txt'

      - name: Install Python deps
        run: |
          pip install -r .github/scripts/requirements.txt

      # ── 3. Vale ──────────────────────────────────────────────────
      - name: Install Vale
        run: |
          VALE_VERSION="3.14.2"
          curl -sL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Windows_64-bit.zip" \
            -o "$RUNNER_TEMP/vale.zip"
          unzip -o "$RUNNER_TEMP/vale.zip" -d "$RUNNER_TEMP/vale-bin"
          echo "$RUNNER_TEMP/vale-bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/vale-bin/vale" --version

      - name: Sync Vale packages (Microsoft, proselint)
        run: |
          "$RUNNER_TEMP/vale-bin/vale" sync

      # ── 4. Определяем изменённые файлы ───────────────────────────
      - name: Get changed docs files
        id: changed-files
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^docs/(ru|en)/.+\.mdx$' \
            || true)

          if [ -z "$CHANGED" ]; then
            echo "No eligible docs files changed."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "$CHANGED" > "$RUNNER_TEMP/changed_files.txt"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Если нет подходящих файлов — выходим ──────────────────
      - name: Skip if no docs changed
        if: steps.changed-files.outputs.has_files == 'false'
        run: |
          echo "No docs/ru or docs/en .mdx files changed. Skipping review."

      # ── 6. Vale lint ─────────────────────────────────────────────
      - name: Run Vale
        if: steps.changed-files.outputs.has_files == 'true'
        id: vale
        run: |
          FILES=$(cat "$RUNNER_TEMP/changed_files.txt" | tr '\n' ' ')
          "$RUNNER_TEMP/vale-bin/vale" --output=JSON --config=.vale.ini $FILES \
            > "$RUNNER_TEMP/vale_output.json" 2>/dev/null || true

          echo "Vale output:"
          python -m json.tool "$RUNNER_TEMP/vale_output.json" 2>/dev/null \
            | head -80 || cat "$RUNNER_TEMP/vale_output.json"

      # ── 7. Health-check MCP-сервера ───────────────────────────────
      - name: MCP server health check
        if: steps.changed-files.outputs.has_files == 'true'
        id: mcp-health
        env:
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10
          STATUS="unavailable"

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $MCP_API_KEY" \
              --max-time 10 \
              "$MCP_SERVER_URL/health" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "MCP server is healthy."
              STATUS="ok"
              break
            else
              echo "Got HTTP $HTTP_CODE, retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "mcp_status=$STATUS" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "ok" ]; then
            echo "::warning::MCP server unavailable after $MAX_RETRIES attempts. Agent will use local style guide fallback."
          fi

      # ── 8. LLM review agent ───────────────────────────────────────
      - name: Run LLM review agent
        if: steps.changed-files.outputs.has_files == 'true'
        env:
          # LLM-настройки (OpenAI-совместимый API)
          LLM_API_KEY:   ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:  ${{ vars.LLM_BASE_URL }}
          LLM_MODEL:     ${{ vars.LLM_MODEL }}
          # MCP + GitHub
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_API_KEY:    ${{ secrets.MCP_API_KEY }}
          MCP_STATUS:     ${{ steps.mcp-health.outputs.mcp_status }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
          REPO:           ${{ github.repository }}
          BASE_REF:       ${{ github.base_ref }}
        run: |
          python .github/scripts/review-agent.py \
            --changed-files "$RUNNER_TEMP/changed_files.txt" \
            --vale-output "$RUNNER_TEMP/vale_output.json"
