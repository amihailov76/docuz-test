name: Docs Review

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

concurrency:
  group: docs-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  docs-review:
    if: github.event.label.name == 'docs-review' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      # ── 1. Получаем код ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python ────────────────────────────────────────────────
      - name: Install Python deps
        run: |
          pip install -r .github/scripts/requirements.txt --quiet

      # ── 3. Vale ──────────────────────────────────────────────────
      - name: Install Vale
        run: |
          VALE_VERSION="3.14.2"
          curl -sL --max-time 120 \
            "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Windows_64-bit.zip" \
            -o "$RUNNER_TEMP/vale.zip"
          unzip -o "$RUNNER_TEMP/vale.zip" -d "$RUNNER_TEMP/vale-bin"
          echo "$RUNNER_TEMP/vale-bin" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/vale-bin/vale" --version

      # ── 4. Определяем изменённые файлы ───────────────────────────
      - name: Get changed docs files
        id: changed-files
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^docs/(ru|en)/.+\.mdx$' \
            || true)
          if [ -z "$CHANGED" ]; then
            echo "No eligible docs files changed."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files: $CHANGED"
            echo "$CHANGED" > "$RUNNER_TEMP/changed_files.txt"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Vale lint ─────────────────────────────────────────────
      - name: Run Vale
        if: steps.changed-files.outputs.has_files == 'true'
        id: vale
        run: |
          RU_FILES=$(grep 'docs/ru' "$RUNNER_TEMP/changed_files.txt" 2>/dev/null | tr '\n' ' ' || true)
          EN_FILES=$(grep 'docs/en' "$RUNNER_TEMP/changed_files.txt" 2>/dev/null | tr '\n' ' ' || true)

          if [ -n "$RU_FILES" ]; then
            "$RUNNER_TEMP/vale-bin/vale" --config="$(pwd)/.vale-ru.ini" --output=JSON $RU_FILES \
              > "$RUNNER_TEMP/vale_ru.json" 2>&1 || true
          fi
          if [ -n "$EN_FILES" ]; then
            "$RUNNER_TEMP/vale-bin/vale" --config="$(pwd)/.vale-en.ini" --output=JSON $EN_FILES \
              > "$RUNNER_TEMP/vale_en.json" 2>&1 || true
          fi

          python -c "import json,os,sys;d={};[d.update(json.load(open(f,encoding='utf-8'))) for f in sys.argv[1:] if os.path.exists(f)];print(json.dumps(d))" \
            "$RUNNER_TEMP/vale_ru.json" "$RUNNER_TEMP/vale_en.json" \
            > "$RUNNER_TEMP/vale_output.json" 2>/dev/null \
            || echo "{}" > "$RUNNER_TEMP/vale_output.json"

          echo "Vale warnings: $(python -c "import json;d=json.load(open('$RUNNER_TEMP/vale_output.json'));print(sum(len(v) for v in d.values() if isinstance(v,list)))" 2>/dev/null || echo 0)"

      # ── 6. Health-check MCP-сервера ───────────────────────────────
      - name: MCP server health check
        if: steps.changed-files.outputs.has_files == 'true'
        id: mcp-health
        env:
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
        run: |
          STATUS="unavailable"
          for i in 1 2 3; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $MCP_API_KEY" \
              --max-time 10 \
              "$MCP_SERVER_URL/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS="ok"; break
            fi
            sleep 10
          done
          echo "mcp_status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "MCP status: $STATUS"

      # ── 7. LLM review agent ───────────────────────────────────────
      - name: Run LLM review agent
        if: steps.changed-files.outputs.has_files == 'true'
        env:
          LLM_API_KEY:    ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:   ${{ vars.LLM_BASE_URL }}
          LLM_MODEL:      ${{ vars.LLM_MODEL }}
          MCP_SERVER_URL: ${{ vars.MCP_SERVER_URL }}
          MCP_API_KEY:    ${{ secrets.MCP_API_KEY }}
          MCP_STATUS:     ${{ steps.mcp-health.outputs.mcp_status }}
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
          REPO:           ${{ github.repository }}
          BASE_REF:       ${{ github.base_ref }}
        run: |
          python .github/scripts/review-agent.py \
            --changed-files "$RUNNER_TEMP/changed_files.txt" \
            --vale-output "$RUNNER_TEMP/vale_output.json"
