StylesPath = styles
MinAlertLevel = warning
Vocab = Base

# Загружаемые внешние пакеты (для английских текстов)
Packages = Microsoft, proselint

# ──────────────────────────────────────────────
# Глобальные настройки для всех MDX-файлов
# ──────────────────────────────────────────────
[*.mdx]

# Игнорируем JSX-компоненты Mintlify/Docusaurus:
# Accordion, AccordionGroup, Card, CardGroup, CodeGroup,
# Highlight, Info, Layout, Note, Step, Steps, Tab, Tabs, Tip, Warning
TokenIgnores = (?i)(</?(?:Accordion(?:Group)?|Card(?:Group)?|CodeGroup|Highlight|Info|Layout|Note|Steps?|Tab(?:s)?|Tip|Warning)(?:\s[^>]*)*/?>)

# Игнорируем содержимое кодовых блоков и инлайн-кода
IgnoredScopes = code, tt, math

# ──────────────────────────────────────────────
# Русские статьи: docs/ru/**
# ──────────────────────────────────────────────
[docs/ru/*.mdx]
BasedOnStyles = Vale, Russian

[docs/ru/**/*.mdx]
BasedOnStyles = Vale, Russian

# ──────────────────────────────────────────────
# Английские статьи: docs/en/**
# ──────────────────────────────────────────────
[docs/en/*.mdx]
BasedOnStyles = Vale, Microsoft, proselint

[docs/en/**/*.mdx]
BasedOnStyles = Vale, Microsoft, proselint
